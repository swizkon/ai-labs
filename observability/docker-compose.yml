services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ibm-mq:
    image: ibmcom/mq:latest
    hostname: ibm-mq
    ports:
      - "1414:1414"
      - "9443:9443"
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_APP_PASSWORD: passw0rd
    healthcheck:
      test: ["CMD", "dspmq", "-m", "QM1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki

  broadcast-parser:
    build:
      context: .
      dockerfile: docker/BroadcastParser.Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Mongo: mongodb://mongo:27017
      Mongo__Database: factory
      IbmMq__Host: ibm-mq
      IbmMq__Port: "1414"
      IbmMq__Channel: DEV.APP.SVRCONN
      IbmMq__QueueManager: QM1
      IbmMq__User: app
      IbmMq__Password: passw0rd
      IbmMq__PimQueue: DEV.QUEUE.1
      IbmMq__InstructionsQueue: DEV.QUEUE.2
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_started
      ibm-mq:
        condition: service_healthy

  pim-integrator:
    build:
      context: .
      dockerfile: docker/PIMIntegrator.Dockerfile
    environment:
      IbmMq__Host: ibm-mq
      IbmMq__Port: "1414"
      IbmMq__Channel: DEV.APP.SVRCONN
      IbmMq__QueueManager: QM1
      IbmMq__User: app
      IbmMq__Password: passw0rd
      IbmMq__PimQueue: DEV.QUEUE.1
      IbmMq__InstructionsQueue: DEV.QUEUE.2
    depends_on:
      ibm-mq:
        condition: service_healthy

  instructions-generator:
    build:
      context: .
      dockerfile: docker/InstructionsGenerator.Dockerfile
    environment:
      IbmMq__Host: ibm-mq
      IbmMq__Port: "1414"
      IbmMq__Channel: DEV.APP.SVRCONN
      IbmMq__QueueManager: QM1
      IbmMq__User: app
      IbmMq__Password: passw0rd
      IbmMq__PimQueue: DEV.QUEUE.1
      IbmMq__InstructionsQueue: DEV.QUEUE.2
    depends_on:
      ibm-mq:
        condition: service_healthy

volumes:
  mongo_data:
  loki_data:
